services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-gateway-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 18437
      HOST: 0.0.0.0
    ports:
      - "${BACKEND_PORT:-18437}:18437"
    volumes:
      - ./certs/backend:/certs/backend:ro
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$TLS_ENABLED\" = \"true\" ]; then wget --no-check-certificate -qO- https://127.0.0.1:18437/health >/dev/null 2>&1; else wget -qO- http://127.0.0.1:18437/health >/dev/null 2>&1; fi || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-gateway-worker
    restart: unless-stopped
    command: ["/app/worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/proxy}
        NEXT_PUBLIC_DEFAULT_BACKEND_ID: ${NEXT_PUBLIC_DEFAULT_BACKEND_ID:-local-docker}
        NEXT_PUBLIC_DEFAULT_BACKEND_NAME: ${NEXT_PUBLIC_DEFAULT_BACKEND_NAME:-Local Docker Backend}
        NEXT_PUBLIC_DEFAULT_BACKEND_URL: ${NEXT_PUBLIC_DEFAULT_BACKEND_URL:-http://api:18437}
        NEXT_PUBLIC_DEFAULT_BACKEND_INSECURE_TLS: ${NEXT_PUBLIC_DEFAULT_BACKEND_INSECURE_TLS:-false}
    container_name: ai-gateway-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      FRONTEND_HOST: 0.0.0.0
      DEFAULT_BACKEND_INTERNAL_URL: ${DEFAULT_BACKEND_INTERNAL_URL:-http://api:18437}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/proxy}
      NEXT_PUBLIC_DEFAULT_BACKEND_ID: ${NEXT_PUBLIC_DEFAULT_BACKEND_ID:-local-docker}
      NEXT_PUBLIC_DEFAULT_BACKEND_NAME: ${NEXT_PUBLIC_DEFAULT_BACKEND_NAME:-Local Docker Backend}
      NEXT_PUBLIC_DEFAULT_BACKEND_URL: ${NEXT_PUBLIC_DEFAULT_BACKEND_URL:-http://api:18437}
      NEXT_PUBLIC_DEFAULT_BACKEND_INSECURE_TLS: ${NEXT_PUBLIC_DEFAULT_BACKEND_INSECURE_TLS:-false}
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./certs/frontend:/certs/frontend:ro
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$FRONTEND_TLS_ENABLED\" = \"true\" ]; then wget --no-check-certificate -qO- https://127.0.0.1:8080 >/dev/null 2>&1; else wget -qO- http://127.0.0.1:8080 >/dev/null 2>&1; fi || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
